spring.application.name=backend

# Session configuration
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=30m

# When running behind a reverse proxy, honor X-Forwarded-* headers
# (X-Forwarded-Proto, X-Forwarded-Host, etc.) so Spring knows the original scheme/host
server.forward-headers-strategy=framework

# Temporary debug logging for diagnosing auth issues. Remove once auth is working.
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# 🌍 External APIs (Open-Meteo δεν χρειάζεται API key — εκμηδενίσαμε το OPENWEATHER_API_KEY)
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-flash-lite-latest

#Database Configuration
spring.datasource.url=jdbc:postgresql://giorgosan.gr:5432/student_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver